server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: conversation-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:conversation_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs

app:
  openapi:
    server-url: ${OPENAPI_SERVER_URL:http://localhost:8080}
