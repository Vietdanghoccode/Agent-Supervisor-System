apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-redis-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-redis
  labels:
    app: agent-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-redis
  template:
    metadata:
      labels:
        app: agent-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --notify-keyspace-events
            - Ex
            - --dir
            - /data
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agent-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: agent-redis
spec:
  selector:
    app: agent-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  labels:
    app: agent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
        - name: agent-service
          image: agent-service:phase4-simplified-redis
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8084
          env:
            - name: REDIS_HOST
              value: agent-redis
            - name: REDIS_PORT
              value: "6379"
            - name: RESERVATION_TTL
              value: 30s
            - name: RESERVATION_RECONCILIATION_INTERVAL
              value: 1s
            - name: WAITING_REQUEST_RETENTION
              value: 24h
            - name: OPENAPI_SERVER_URL
              value: http://localhost:8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
spec:
  selector:
    app: agent-service
  ports:
    - name: http
      port: 80
      targetPort: 8084
