server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # --- API Docs routes (must be before general routes) ---
            - id: user-service-api-docs-route
              uri: ${USER_SERVICE_URL:http://user-service:80}
              predicates:
                - Path=/api/user/v3/api-docs
              filters:
                - RewritePath=/api/user/v3/api-docs, /v3/api-docs
            - id: auth-service-api-docs-route
              uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
              predicates:
                - Path=/api/auth/v3/api-docs
              filters:
                - RewritePath=/api/auth/v3/api-docs, /v3/api-docs
            - id: conversation-service-api-docs-route
              uri: ${CONVERSATION_SERVICE_URL:http://conversation-service:80}
              predicates:
                - Path=/api/conversation/v3/api-docs
              filters:
                - RewritePath=/api/conversation/v3/api-docs, /v3/api-docs
            - id: agent-service-api-docs-route
              uri: ${AGENT_SERVICE_URL:http://agent-service:80}
              predicates:
                - Path=/api/agent/v3/api-docs
              filters:
                - RewritePath=/api/agent/v3/api-docs, /v3/api-docs
            # --- General service routes ---
            - id: user-service-route
              uri: ${USER_SERVICE_URL:http://user-service:80}
              predicates:
                - Path=/api/user/**
            - id: auth-service-route
              uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
              predicates:
                - Path=/api/auth/**
            - id: conversation-service-route
              uri: ${CONVERSATION_SERVICE_URL:http://conversation-service:80}
              predicates:
                - Path=/conversations/**
            - id: agent-service-route
              uri: ${AGENT_SERVICE_URL:http://agent-service:80}
              predicates:
                - Path=/agents/**,/reservations/**

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: user-service
        url: /api/user/v3/api-docs
      - name: auth-service
        url: /api/auth/v3/api-docs
      - name: conversation-service
        url: /api/conversation/v3/api-docs
      - name: agent-service
        url: /api/agent/v3/api-docs
