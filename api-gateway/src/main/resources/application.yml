server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: http://user-service:80
          predicates:
            - Path=/api/user/**
        - id: auth-service-route
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
