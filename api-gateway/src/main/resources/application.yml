server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: http://${USER_SERVICE_HOST:user-service}:${USER_SERVICE_PORT:8082}
          predicates:
            - Path=/api/user/**
        - id: auth-service-route
          uri: http://${AUTH_SERVICE_HOST:auth-service}:${AUTH_SERVICE_PORT:8081}
          predicates:
            - Path=/api/auth/**
